name: Build APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'docs/manifest.webmanifest'
      - 'docs/icons/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret 没设。看 android/README.md 一次性生成。"
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@1.23.0

      - name: Pre-configure Bubblewrap (skip JDK/SDK install prompts)
        run: |
          mkdir -p ~/.bubblewrap
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${SDK}"
          }
          EOF
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_SDK=$SDK"
          test -x "$JAVA_HOME/bin/java" || (echo "no java"; exit 1)
          test -d "$SDK" || (echo "no android sdk at $SDK"; exit 1)
          cat ~/.bubblewrap/config.json

      - name: Restore keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          cd android
          echo "$KS_B64" | base64 -d > android.keystore
          ls -la android.keystore

      - name: Bump version
        run: |
          cd android
          N=${{ github.run_number }}
          jq --argjson n "$N" \
             '.appVersionCode = $n | .appVersionName = "1.0." + ($n | tostring)' \
             twa-manifest.json > tmp && mv tmp twa-manifest.json
          echo "VERSION=1.0.$N" >> "$GITHUB_ENV"
          jq '{packageId, appVersionName, appVersionCode, signingKey}' twa-manifest.json

      - name: Scaffold Android project from twa-manifest.json
        working-directory: android
        run: |
          # update 是非交互的，从 twa-manifest.json 直接生成完整 Android 项目脚手架
          bubblewrap update --skipVersionUpgrade
          ls -la
          test -f app/build.gradle && echo "scaffold ok" || (echo "no scaffold"; exit 1)

      - name: Build & sign APK
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Locate APK
        id: locate
        working-directory: android
        run: |
          APK=$(find . -name 'app-release-signed.apk' -o -name 'app-release.apk' | head -1)
          echo "APK at $APK"
          cp "$APK" "../oulu-lunch-${{ env.VERSION }}.apk"
          echo "apk_path=oulu-lunch-${{ env.VERSION }}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ env.VERSION }}
          name: "午饭 APK ${{ env.VERSION }}"
          body: |
            自动构建的 TWA APK（PWA 包成原生 Android 应用）。

            **安装**：下载 `oulu-lunch-${{ env.VERSION }}.apk` → 手机点开 → 允许"未知来源" → 装。
            **更新**：直接装新版覆盖即可（同一签名 keystore）。
          files: ${{ steps.locate.outputs.apk_path }}
          fail_on_unmatched_files: true
