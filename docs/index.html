<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Oulu 午饭</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="午饭">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    @supports (padding: max(0px)) {
      header { padding-top: max(0.75rem, env(safe-area-inset-top)); }
      main { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="sticky top-0 bg-white/90 backdrop-blur border-b border-slate-200 px-4 py-3 z-10">
    <div class="flex items-baseline justify-between gap-3">
      <h1 class="text-lg font-bold">🍽️ Oulu 午饭</h1>
      <span id="date" class="text-sm text-slate-500"></span>
    </div>
  </header>

  <main id="restaurants" class="p-4 space-y-4 pb-12">
    <div class="text-center text-slate-400 py-16">加载中…</div>
  </main>

  <script>
    const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
    const now = new Date();
    document.getElementById('date').textContent =
      `${now.getMonth()+1}/${now.getDate()} ${WEEKDAYS[now.getDay()]}`;

    function parseHours(s) {
      if (!s) return null;
      const m = s.match(/(\d{1,2}):?(\d{2})?\s*[-–~]\s*(\d{1,2}):?(\d{2})?/);
      if (!m) return null;
      return {
        open:  (+m[1])*60 + (+(m[2]||0)),
        close: (+m[3])*60 + (+(m[4]||0)),
      };
    }
    function statusOf(hoursStr) {
      const h = parseHours(hoursStr);
      const d = now.getDay();
      if (d === 0 || d === 6) return { open: false, text: '周末' };
      if (!h) return { open: false, text: '—' };
      const cur = now.getHours()*60 + now.getMinutes();
      if (cur < h.open)  return { open: false, text: '尚未营业' };
      if (cur > h.close) return { open: false, text: '已打烊' };
      return { open: true, text: '营业中' };
    }

    function tagsHtml(tags) {
      return (tags || []).map(t =>
        `<span class="text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded">${t}</span>`
      ).join('');
    }

    function renderMain(d) {
      const media = d.image_url
        ? `<img src="${d.image_url}" alt="" loading="lazy" class="w-full aspect-square object-cover bg-slate-100">`
        : `<div class="w-full aspect-square bg-slate-50 flex items-center justify-center text-5xl">${d.emoji || '🍽️'}</div>`;
      const premium = d.is_premium
        ? `<span class="absolute top-1.5 left-1.5 text-[10px] px-1.5 py-0.5 bg-purple-600 text-white rounded font-medium">特殊餐</span>` : '';
      return `
        <article class="rounded-xl overflow-hidden border border-slate-200 bg-white">
          <div class="relative">${media}${premium}</div>
          <div class="px-2.5 py-2">
            <div class="text-sm font-semibold text-slate-900 leading-tight">${d.zh || d.fi}</div>
            <div class="text-[10px] text-slate-400 mt-0.5 leading-tight break-words">${d.fi}</div>
            ${(d.tags && d.tags.length) ? `<div class="mt-1 flex gap-1 flex-wrap">${tagsHtml(d.tags)}</div>` : ''}
          </div>
        </article>`;
    }

    function renderSmallItem(d, opts = {}) {
      const pillCls = opts.warn ? 'bg-pink-50 text-pink-700' : 'bg-slate-50 text-slate-700';
      return `
        <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs ${pillCls}">
          <span>${d.emoji || '·'}</span>
          <span>${d.zh || d.fi}</span>
          <span class="text-[10px] text-slate-400">${d.fi}</span>
          ${d.is_premium ? '<span class="text-[10px] text-purple-700">+€</span>' : ''}
        </span>`;
    }

    function section(title, items, opts = {}) {
      if (!items || !items.length) return '';
      return `
        <section class="mt-3 first:mt-2">
          <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">${title}</h3>
          <div class="flex flex-wrap gap-1.5">${items.map(d => renderSmallItem(d, opts)).join('')}</div>
        </section>`;
    }

    function priceLine(r) {
      const parts = [];
      if (r.price_basic)  parts.push(`基础餐 <b class="text-slate-700">${r.price_basic} €</b>`);
      if (r.price_fusion) parts.push(`特殊餐 <b class="text-slate-700">${r.price_fusion} €</b>`);
      if (!parts.length)  parts.push('学生价见柜台');
      return parts.join(' · ');
    }

    function renderRestaurant(r) {
      const s = statusOf(r.hours);
      const badge = s.open ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500';
      const empty = !(r.mains?.length || r.staples?.length || r.sauces?.length ||
                       r.salads?.length || r.desserts?.length || r.sides?.length);
      const mainsHtml = (r.mains && r.mains.length)
        ? `<section>
             <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">今日主菜（任选一）</h3>
             <div class="grid grid-cols-2 gap-2.5">${r.mains.map(renderMain).join('')}</div>
           </section>`
        : '';
      return `
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <header class="px-4 py-3 border-b border-slate-100">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <h2 class="font-semibold">${r.name}</h2>
                <p class="text-xs text-slate-500 mt-0.5">${r.hours || '—'}${r.location ? ` · ${r.location}` : ''}</p>
              </div>
              <span class="text-xs px-2 py-1 rounded-full whitespace-nowrap ${badge}">${s.text}</span>
            </div>
            <p class="text-[11px] text-slate-500 mt-1.5">${priceLine(r)}</p>
            <p class="text-[11px] text-slate-400 mt-0.5">学生餐含：自助沙拉吧 · 面包+黄油 · 1 杯水 · 1 杯餐饮</p>
          </header>
          <div class="p-3">
            ${empty ? '<div class="py-6 text-sm text-slate-400 text-center">今天没抓到菜单</div>' : ''}
            ${mainsHtml}
            ${section('主食', r.staples)}
            ${section('配菜', r.sides)}
            ${section('配酱', r.sauces)}
            ${section('沙拉', r.salads)}
            ${section('甜点 / 可能另付', r.desserts, {warn: true})}
          </div>
        </section>`;
    }

    async function load() {
      const main = document.getElementById('restaurants');
      try {
        const r = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const html = (data.restaurants||[]).map(renderRestaurant).join('') + `
          <p class="text-center text-xs text-slate-400 pt-2">数据：Juvenes / Jamix · 翻译：Gemini · 图：Pexels</p>
          <p class="text-center text-xs text-slate-400">更新于 ${data.updated_at ? new Date(data.updated_at).toLocaleString('zh-CN') : '—'}</p>`;
        main.innerHTML = html || '<div class="text-center text-slate-400 py-16">尚无数据，等 GitHub Action 跑一次</div>';
      } catch (e) {
        main.innerHTML = `<div class="text-center text-red-500 py-12">加载失败：${e.message}</div>`;
      }
    }
    load();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
