<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Oulu 午饭</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="午饭">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    @supports (padding: max(0px)) {
      header { padding-top: max(0.75rem, env(safe-area-inset-top)); }
      main { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="sticky top-0 bg-white/90 backdrop-blur border-b border-slate-200 px-4 py-3 z-10">
    <div class="flex items-baseline justify-between gap-3">
      <h1 class="text-lg font-bold">🍽️ Oulu 午饭</h1>
      <span id="date" class="text-sm text-slate-500"></span>
    </div>
  </header>

  <main id="restaurants" class="p-4 space-y-4 pb-12">
    <div class="text-center text-slate-400 py-16">加载中…</div>
  </main>

  <script>
    const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
    const now = new Date();
    document.getElementById('date').textContent =
      `${now.getMonth()+1}/${now.getDate()} ${WEEKDAYS[now.getDay()]}`;

    function parseHours(s) {
      if (!s) return null;
      const m = s.match(/(\d{1,2}):?(\d{2})?\s*[-–~]\s*(\d{1,2}):?(\d{2})?/);
      if (!m) return null;
      return {
        open:  (+m[1])*60 + (+(m[2]||0)),
        close: (+m[3])*60 + (+(m[4]||0)),
      };
    }
    function statusOf(hoursStr) {
      const h = parseHours(hoursStr);
      const d = now.getDay();
      if (d === 0 || d === 6) return { open: false, text: '周末' };
      if (!h) return { open: false, text: '—' };
      const cur = now.getHours()*60 + now.getMinutes();
      if (cur < h.open)  return { open: false, text: '尚未营业' };
      if (cur > h.close) return { open: false, text: '已打烊' };
      return { open: true, text: '营业中' };
    }

    function renderDish(d) {
      const media = d.image_url
        ? `<img src="${d.image_url}" alt="" loading="lazy" class="w-20 h-20 rounded-xl object-cover flex-shrink-0 bg-slate-100">`
        : `<span class="text-4xl leading-none flex-shrink-0 w-20 h-20 flex items-center justify-center bg-slate-50 rounded-xl">${d.emoji || '🍽️'}</span>`;
      const cat = d.category
        ? `<span class="text-[10px] px-1.5 py-0.5 bg-amber-50 text-amber-700 rounded">${d.category}</span>`
        : '';
      const tags = (d.tags || []).map(t =>
        `<span class="text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded">${t}</span>`
      ).join('');
      const meta = (cat || tags)
        ? `<div class="mt-1 flex gap-1 flex-wrap">${cat}${tags}</div>` : '';
      return `
        <li class="px-4 py-3 flex items-start gap-3">
          ${media}
          <div class="flex-1 min-w-0">
            <div class="font-medium text-slate-900 break-words">${d.zh || d.fi}</div>
            <div class="text-xs text-slate-500 mt-0.5 break-words">${d.fi}</div>
            ${meta}
          </div>
        </li>`;
    }

    function renderRestaurant(r) {
      const s = statusOf(r.hours);
      const badge = s.open
        ? 'bg-green-100 text-green-700'
        : 'bg-slate-100 text-slate-500';
      const dishes = (r.dishes||[]).length
        ? r.dishes.map(renderDish).join('')
        : `<li class="px-4 py-6 text-sm text-slate-400 text-center">今天没抓到菜单</li>`;
      return `
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <header class="px-4 py-3 border-b border-slate-100 flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h2 class="font-semibold truncate">${r.name}</h2>
              <p class="text-xs text-slate-500 mt-0.5">
                ${r.hours || '—'} · €${r.price ?? '—'}
                ${r.location ? ` · ${r.location}` : ''}
              </p>
            </div>
            <span class="text-xs px-2 py-1 rounded-full whitespace-nowrap ${badge}">${s.text}</span>
          </header>
          <ul class="divide-y divide-slate-100">${dishes}</ul>
        </section>`;
    }

    async function load() {
      const main = document.getElementById('restaurants');
      try {
        const r = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const html = (data.restaurants||[]).map(renderRestaurant).join('') + `
          <p class="text-center text-xs text-slate-400 pt-2">数据：lounaat.info · 翻译：Claude</p>
          <p class="text-center text-xs text-slate-400">更新于 ${data.updated_at ? new Date(data.updated_at).toLocaleString('zh-CN') : '—'}</p>`;
        main.innerHTML = html || '<div class="text-center text-slate-400 py-16">尚无数据，等 GitHub Action 跑一次</div>';
      } catch (e) {
        main.innerHTML = `<div class="text-center text-red-500 py-12">加载失败：${e.message}</div>`;
      }
    }
    load();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
