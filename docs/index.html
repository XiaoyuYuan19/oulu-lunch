<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Oulu 午饭</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="午饭">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    @supports (padding: max(0px)) {
      header { padding-top: max(0.75rem, env(safe-area-inset-top)); }
      main { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <header class="sticky top-0 bg-white/95 backdrop-blur border-b border-slate-200 z-20">
    <div class="px-4 py-2.5 flex items-baseline justify-between gap-3">
      <h1 class="text-base font-bold">🍽️ Oulu 午饭</h1>
      <span id="updated" class="text-[11px] text-slate-400"></span>
    </div>
    <nav id="dayTabs" class="flex overflow-x-auto gap-1 px-2 pb-2 -mx-px"></nav>
  </header>

  <main id="restaurants" class="p-4 space-y-4 pb-12">
    <div class="text-center text-slate-400 py-16">加载中…</div>
  </main>

  <section id="installHint" class="mx-4 mb-8 rounded-xl bg-white border border-slate-200 overflow-hidden">
    <details>
      <summary class="px-4 py-3 cursor-pointer font-medium text-slate-900 flex items-center gap-2">
        <span>📲</span><span>装到手机</span>
      </summary>
      <div class="px-4 pb-4 text-sm text-slate-600 space-y-2.5 leading-relaxed">
        <p><b class="text-slate-800">Android</b>：Chrome 打开本页 → 右上 ⋮ → "安装应用"。</p>
        <p><b class="text-slate-800">iOS</b>：Safari 打开本页 → 底部分享 ⬆️ → "添加到主屏幕"。</p>
        <p class="text-[12px] text-slate-400">装好后从主屏图标开，全屏运行，能离线看上次菜单。</p>
      </div>
    </details>
  </section>

  <script>
    // 如果已经从主屏 PWA 模式打开，隐藏安装提示
    if (window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true) {
      const h = document.getElementById('installHint');
      if (h) h.style.display = 'none';
    }
  </script>

  <script>
    const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

    function parseYmd(n) {
      const s = String(n);
      return new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8));
    }
    function tabLabel(ymd, todayYmd) {
      const d = parseYmd(ymd);
      const tag = ymd === todayYmd ? '今天' :
                  ymd === todayYmd + 1 ? '明天' : '';
      return {
        weekday: WEEKDAYS[d.getDay()],
        date: `${d.getMonth()+1}/${d.getDate()}`,
        tag,
      };
    }

    function parseHours(s) {
      if (!s) return null;
      const m = s.match(/(\d{1,2}):?(\d{2})?\s*[-–~]\s*(\d{1,2}):?(\d{2})?/);
      if (!m) return null;
      return {
        open:  (+m[1])*60 + (+(m[2]||0)),
        close: (+m[3])*60 + (+(m[4]||0)),
      };
    }
    function statusOf(hoursStr, ymd, todayYmd) {
      // 只对"今天"显示营业中/打烊；其他日子静默
      if (ymd !== todayYmd) return { open: false, text: '' };
      const h = parseHours(hoursStr);
      if (!h) return { open: false, text: '' };
      const n = new Date();
      const cur = n.getHours()*60 + n.getMinutes();
      if (cur < h.open)  return { open: false, text: '尚未营业' };
      if (cur > h.close) return { open: false, text: '已打烊' };
      return { open: true, text: '营业中' };
    }

    function tagsHtml(tags, cls = 'bg-slate-100 text-slate-600') {
      return (tags || []).map(t =>
        `<span class="text-[10px] px-1.5 py-0.5 ${cls} rounded-full">${t}</span>`
      ).join('');
    }

    function imgKey(restName, ymd, fi) { return `img:${restName}|${ymd}|${fi}`; }
    function currentImgIdx(restName, ymd, fi, n) {
      const raw = localStorage.getItem(imgKey(restName, ymd, fi));
      const i = raw == null ? 0 : (+raw || 0);
      return n > 0 ? ((i % n) + n) % n : 0;
    }
    function bumpImgIdx(restName, ymd, fi, n) {
      const cur = currentImgIdx(restName, ymd, fi, n);
      localStorage.setItem(imgKey(restName, ymd, fi), String((cur + 1) % n));
    }

    function renderMain(d, ctx) {
      const urls = (d.image_urls && d.image_urls.length) ? d.image_urls
                  : (d.image_url ? [d.image_url] : []);
      const idx = currentImgIdx(ctx.restName, ctx.ymd, d.fi, urls.length);
      const url = urls[idx] || '';
      const canSwap = urls.length > 1;
      const refreshBtn = canSwap
        ? `<button type="button" data-refresh="${encodeURIComponent(d.fi)}"
              class="absolute top-1 right-1 w-7 h-7 flex items-center justify-center
                     rounded-full bg-black/55 text-white text-sm backdrop-blur
                     active:scale-95 transition"
              aria-label="换一张图">↻</button>
           <span class="absolute bottom-1 right-1 text-[10px] px-1.5 py-0.5 rounded-full bg-black/50 text-white">${idx+1}/${urls.length}</span>`
        : '';
      const media = url
        ? `<div class="relative w-28 h-28 sm:w-32 sm:h-32 flex-shrink-0">
             <img src="${url}" alt="" loading="lazy" class="w-full h-full object-cover bg-slate-100">${refreshBtn}
           </div>`
        : `<div class="w-28 h-28 sm:w-32 sm:h-32 bg-slate-50 flex items-center justify-center text-5xl flex-shrink-0">${d.emoji || '🍽️'}</div>`;
      const tags = tagsHtml(d.tags);
      return `
        <article class="flex items-stretch border-b border-slate-100 last:border-b-0">
          ${media}
          <div class="flex-1 min-w-0 px-3 py-2.5 flex flex-col justify-center">
            <div class="text-base font-semibold text-slate-900 leading-snug">${d.zh || d.fi}</div>
            <div class="text-[11px] text-slate-400 mt-0.5 break-words">${d.fi}</div>
            ${tags ? `<div class="mt-1.5 flex gap-1 flex-wrap">${tags}</div>` : ''}
          </div>
        </article>`;
    }

    function compactLine(label, items, opts = {}) {
      if (!items || !items.length) return '';
      const sep = '<span class="text-slate-300 mx-1">·</span>';
      const text = items.map(d => {
        const prem = d.is_premium ? ' <span class="text-purple-600">+€</span>' : '';
        return `<span class="whitespace-nowrap">${d.emoji || ''} ${d.zh || d.fi}${prem}</span>`;
      }).join(sep);
      const labelCls = opts.warn ? 'text-pink-700' : 'text-slate-500';
      return `
        <div class="px-4 py-2 text-[13px] text-slate-600 border-t border-slate-100 leading-relaxed">
          <span class="${labelCls} font-medium mr-1.5">${label}</span>${text}
        </div>`;
    }

    function fmtEUR(n) { return (typeof n === 'number') ? n.toFixed(2).replace('.', ',') : '—'; }
    function priceTriple(triple) {
      if (!triple || !triple.length) return '';
      const [s, w, v] = triple;
      return `
        <div class="flex items-baseline gap-1.5 text-sm tabular-nums">
          <span class="font-bold text-slate-900">${fmtEUR(s)}</span>
          <span class="text-slate-400">/</span>
          <span class="font-semibold text-slate-700">${fmtEUR(w)}</span>
          <span class="text-slate-400">/</span>
          <span class="text-slate-600">${fmtEUR(v)}</span>
          <span class="text-[10px] text-slate-400 ml-0.5">€</span>
        </div>
        <div class="text-[10px] text-slate-400 leading-tight">学生 / 教职工·博士 / 访客</div>`;
    }

    function mainsSection(label, priceTriple_, kelaIncluded, items, accentCls, ctx) {
      if (!items || !items.length) return '';
      return `
        <div class="border-t border-slate-100">
          <div class="px-4 pt-3 pb-2 flex items-start justify-between gap-3 ${accentCls}">
            <div>
              <div class="text-[11px] font-bold uppercase tracking-wide">${label}</div>
              <div class="text-[10px] mt-0.5 text-slate-500">${kelaIncluded ? 'KELA 补贴 · 含沙拉/面包/餐饮' : '加价 · 不享 KELA'}</div>
            </div>
            <div class="text-right">${priceTriple_}</div>
          </div>
          <div>${items.map(d => renderMain(d, ctx)).join('')}</div>
        </div>`;
    }

    function renderRestaurant(r, ymd, todayYmd) {
      const day = (r.by_date && r.by_date[String(ymd)]) || {};
      const s = statusOf(r.hours, ymd, todayYmd);
      const badge = s.open ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500';
      const mains = day.main || [];
      const basicMains   = mains.filter(m => !m.is_premium);
      const premiumMains = mains.filter(m =>  m.is_premium);
      const empty = !(mains.length || day.staple?.length || day.sauce?.length ||
                       day.salad?.length || day.dessert?.length || day.side?.length);
      const carbsAndSides = [...(day.staple || []), ...(day.side || [])];

      const ctx = { restName: r.name, ymd };
      const prices = r.prices || {};
      const basicBlock = (prices.basic && (basicMains.length || !premiumMains.length))
        ? mainsSection('基础餐', priceTriple(prices.basic), true,
            basicMains, 'text-emerald-700', ctx)
        : '';
      const premiumBlock = (prices.fusion && premiumMains.length)
        ? mainsSection('特殊餐', priceTriple(prices.fusion), false,
            premiumMains, 'text-purple-700', ctx)
        : '';
      const noPremiumNote = (prices.fusion && !premiumMains.length)
        ? `<div class="px-4 py-2 text-[11px] text-slate-400 border-t border-slate-100">
             特殊餐 ${fmtEUR(prices.fusion[0])} € · 这天没有
           </div>`
        : '';
      const externalNote = r.external_url
        ? `<div class="px-4 py-2 border-t border-slate-100 text-center">
             <a href="${r.external_url}" target="_blank" rel="noopener"
                class="text-[11px] text-slate-500 hover:text-sky-700">
               官网完整菜单（含过敏原） ↗
             </a>
           </div>`
        : '';
      const statusHtml = s.text
        ? `<span class="text-[11px] px-2 py-0.5 rounded-full whitespace-nowrap ${badge}">${s.text}</span>`
        : '';

      const closedHint = r.closed
        ? `<p class="text-[11px] text-rose-600 mt-1">夏休：${r.closed}</p>` : '';
      const isSodexo = r.provider === 'sodexo_hilla';
      const emptyMsg = empty
        ? (r.closed ? `闭店中（${r.closed}）`
           : isSodexo ? 'Sodexo 还没排（通常每周日/周一更新下周菜单）'
           : '这天没抓到菜单')
        : '';

      return `
        <section data-rest="${r.name}" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <header class="px-4 py-3">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <h2 class="text-lg font-bold">${r.name}</h2>
                <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1 text-sm text-slate-700">
                  <span class="inline-flex items-center gap-1 font-semibold tabular-nums">🕒 ${r.hours || '—'}</span>
                  ${r.location ? `<span class="inline-flex items-center gap-1 font-medium">📍 ${r.location}</span>` : ''}
                </div>
                ${closedHint}
              </div>
              ${statusHtml}
            </div>
          </header>
          ${empty ? `<div class="py-6 text-sm text-slate-400 text-center border-t border-slate-100">${emptyMsg}</div>` : ''}
          ${basicBlock}
          ${premiumBlock}
          ${noPremiumNote}
          ${externalNote}
          ${compactLine('配 ', carbsAndSides)}
          ${compactLine('酱 ', day.sauce)}
          ${compactLine('沙拉 ', day.salad)}
          ${compactLine('甜点 ', day.dessert, {warn: true})}
        </section>`;
    }

    let DATA = null;
    let CURRENT_YMD = null;

    function renderTabs() {
      const tabs = document.getElementById('dayTabs');
      const today = DATA.today;
      tabs.innerHTML = (DATA.dates || []).map(ymd => {
        const lab = tabLabel(ymd, today);
        const active = ymd === CURRENT_YMD;
        const cls = active
          ? 'bg-slate-900 text-white shadow-sm'
          : 'bg-slate-100 text-slate-700 hover:bg-slate-200';
        return `
          <button data-ymd="${ymd}" class="flex-shrink-0 px-3 py-1.5 rounded-full transition ${cls}">
            <span class="block text-[13px] font-semibold leading-tight">${lab.weekday}${lab.tag ? ` · ${lab.tag}` : ''}</span>
            <span class="block text-[10px] opacity-70 leading-tight">${lab.date}</span>
          </button>`;
      }).join('');
      tabs.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
          CURRENT_YMD = +b.dataset.ymd;
          renderTabs();
          renderBody();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    function renderBody() {
      const main = document.getElementById('restaurants');
      const html = (DATA.restaurants || [])
        .map(r => renderRestaurant(r, CURRENT_YMD, DATA.today))
        .join('') + `
        <p class="text-center text-xs text-slate-400 pt-2">数据：Juvenes / Jamix · 翻译：Gemini · 图：Pexels</p>`;
      main.innerHTML = html || '<div class="text-center text-slate-400 py-16">尚无数据，等 GitHub Action 跑一次</div>';
    }

    // 全局点击代理：处理"换图"按钮
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-refresh]');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();
      const fi = decodeURIComponent(btn.dataset.refresh);
      // 找当前餐厅
      const section = btn.closest('section[data-rest]');
      if (!section || !DATA) return;
      const restName = section.dataset.rest;
      const r = (DATA.restaurants || []).find(x => x.name === restName);
      if (!r) return;
      const day = r.by_date?.[String(CURRENT_YMD)] || {};
      const dish = (day.main || []).find(m => m.fi === fi);
      if (!dish) return;
      const urls = (dish.image_urls && dish.image_urls.length) ? dish.image_urls
                  : (dish.image_url ? [dish.image_url] : []);
      if (urls.length < 2) return;
      bumpImgIdx(restName, CURRENT_YMD, fi, urls.length);
      renderBody();
    });

    async function load() {
      const main = document.getElementById('restaurants');
      try {
        const r = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        DATA = await r.json();
        CURRENT_YMD = DATA.today || (DATA.dates || [])[0];
        // 如果今天不在 dates 列表里（周末），落到第一个
        if (!DATA.dates || !DATA.dates.includes(CURRENT_YMD)) {
          CURRENT_YMD = (DATA.dates || [])[0];
        }
        document.getElementById('updated').textContent = DATA.updated_at
          ? '更新于 ' + new Date(DATA.updated_at).toLocaleString('zh-CN', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})
          : '';
        renderTabs();
        renderBody();
      } catch (e) {
        main.innerHTML = `<div class="text-center text-red-500 py-12">加载失败：${e.message}</div>`;
      }
    }
    load();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
