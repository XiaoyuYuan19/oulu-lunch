# Juvenes 在 Oulu 的学生餐厅。菜单数据来自 Jamix Cloud（juvenes.fi 后端）。
# customer_id 是 Juvenes 公司 ID（不要改）；kitchen_id 通过查
#   https://fi.jamix.cloud/apps/menuservice/rest/haku/menu/93077/<kitchen_id>?lang=fi
# 的 kitchenName 字段确认。
#
# 改餐厅：注释掉/删掉不要的；新加的把 kitchen_id 填对就行。
# price_basic = 学生价 Peruslounas（KELA 补贴线，含自助沙拉/面包/水/饮料）
# price_fusion = 学生价 Fusion / Erikoislounas（特殊餐，通常不在 KELA 补贴里）
# null 表示该餐厅不提供这条线。

provider: jamix
customer_id: 93077

restaurants:
  - name: Foobar
    kitchen_id: 69
    hours: "10:30-14:30"
    location: Linnanmaa
    price_basic: "1,24"       # Peruslounas
    price_fusion: "5,90"      # Fusion-ateria
  - name: Kerttu
    kitchen_id: 70
    hours: "10:30-14:30"
    location: Linnanmaa
    price_basic: "1,24"       # Peruslounas + Keittoateria 都是 1,24
    price_fusion: null        # Kerttu 没有 Fusion / Erikois 线
  - name: Mara
    kitchen_id: 49
    hours: "10:30-14:30"
    location: Linnanmaa
    price_basic: "1,24"       # Peruslounas + Salad/Soup
    price_fusion: "5,90"      # Erikoislounas
  - name: Medisiina
    kitchen_id: 75
    hours: "10:30-14:30"
    location: Kontinkangas (医学院)
    price_basic: "1,24"       # Peruslounas
    price_fusion: "5,90"      # 周五特殊餐（仅周五）
