# 在 lounaat.info 上搜你常吃的餐厅，把页面 URL 贴到 url 字段。
# 例：https://www.lounaat.info/lounas/foobar/oulu
#
# hours 是给前端显示"营业中"用的（HH:MM-HH:MM，工作日有效）。
# price 是 lunch 价（学生餐 ~2.95€，非学生 ~7-9€）。
# location 可选，会显示在餐厅名下面。
#
# 下面四家是 Oulu Linnanmaa 校园常见的占位；请在 lounaat.info 自行核对 URL 后保存。

restaurants:
  - name: Foobar
    url: https://www.lounaat.info/lounas/foobar/oulu
    hours: "10:30-14:30"
    price: "2.95"
    location: Linnanmaa
  - name: Voltti
    url: https://www.lounaat.info/lounas/voltti/oulu
    hours: "10:30-14:30"
    price: "2.95"
    location: Linnanmaa
  - name: Mara
    url: https://www.lounaat.info/lounas/mara/oulu
    hours: "10:30-14:30"
    price: "2.95"
    location: Linnanmaa
  - name: Konehuone
    url: https://www.lounaat.info/lounas/konehuone/oulu
    hours: "10:30-14:00"
    price: "2.95"
    location: Linnanmaa
