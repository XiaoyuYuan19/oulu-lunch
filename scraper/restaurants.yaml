# Juvenes 在 Oulu 的学生餐厅。菜单数据来自 Jamix Cloud（juvenes.fi 后端）。
# customer_id 是 Juvenes 公司 ID（不要改）；kitchen_id 通过查
#   https://fi.jamix.cloud/apps/menuservice/rest/haku/menu/93077/<kitchen_id>?lang=fi
# 的 kitchenName 字段确认。
#
# 改餐厅：注释掉/删掉不要的；新加的把 kitchen_id 填对就行。
# price_basic = 学生价 Peruslounas（KELA 补贴线，含自助沙拉/面包/水/饮料）
# price_fusion = 学生价 Fusion / Erikoislounas（特殊餐，通常不在 KELA 补贴里）
# null 表示该餐厅不提供这条线。

